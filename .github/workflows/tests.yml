name: Run Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: ats_user
          POSTGRES_PASSWORD: ats_password
          POSTGRES_DB: ats_db

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U ats_user -d ats_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PYTHONPATH: ${{ github.workspace }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DATABASE_URL: postgresql+asyncpg://ats_user:ats_password@localhost:5432/ats_db

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U ats_user -d ats_db; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready."

      - name: Debug Environment
        run: |
          echo "========== CURRENT DIRECTORY =========="
          pwd

          echo ""
          echo "========== PYTHON VERSION =========="
          python --version

          echo ""
          echo "========== PYTHON PATH =========="
          python -c "import sys; print('\n'.join(sys.path))"

          echo ""
          echo "========== DATABASE URL =========="
          echo "$DATABASE_URL"

          echo ""
          echo "========== ROOT FILES =========="
          ls -la

          echo ""
          echo "========== APP DIRECTORY =========="
          ls -la app

          echo ""
          echo "========== TESTS DIRECTORY =========="
          ls -la tests

      - name: Run Tests
        run: |
          python -m pytest -v